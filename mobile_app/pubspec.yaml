name: pocket_technician_mobile
description: Flutter mobile conversion of Pocket Technician with offline local data storage and OTP login.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  path: ^1.9.0
  intl: ^0.20.1
  fl_chart: ^0.70.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
